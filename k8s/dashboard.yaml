apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: sentiment-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb:27017"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: sentiment
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30851
